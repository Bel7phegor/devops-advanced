variables:
    USER_PROJECT: "onlineshop"
    RUNNER: "online-shop-runner-dev-shell"
    PATH_PROJECT: "/home/${USER_PROJECT}/${CI_PROJECT_NAME}"
    ZIP_VERSION: "${CI_PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}-${CI_COMMIT_SHORT_TAG}.zip"

stages:
    - build
    - push
    - deploy
    - checklog

build:
    stage: build
    variables:
        GIT_STRATEGY: clone
    script:
        - npm install --force
        - zip -r $ZIP_VERSION .
    tags:
        - ${RUNNER}
    only:
        - tags

push:
    stage: build
    variables:
        GIT_STRATEGY: none
    # 3 biến ${ARTIFACT_USER}, ${ARTIFACT_PASSWORD} và ${ARTIFACT_URL} được thêm vào biến toàn cục của group
    script:
        - curl -X PUT -u $ARTIFACT_USER:'$ARTIFACT_PASSWORD' -T $ZIP_VERSION "$ARTIFACT_URL/$ZIP_VERSION"
    tags:
        - ${RUNNER}
    only:
        - tags

deploy:
    stage: deploy
    variables:
        GIT_STRATEGY: none
    script:
        - sudo su ${USER_PROJECT} -c "cd ${PATH_PROJECT};rm -rf *;curl -u $ARTIFACT_USER:'$ARTIFACT_PASSWORD' -O "$ARTIFACT_URL/$ZIP_VERSION";unzip -o $ZIP_VERSION"
        - sudo chown -R ${USER_PROJECT}. ${PATH_PROJECT}
        - sudo su ${USER_PROJECT} -c "cd ${PATH_PROJECT};pm2 delete ${CI_PROJECT_NAME} || true;pm2 start npm --name ${CI_PROJECT_NAME} -- run 'start'"
    tags:
        - ${RUNNER}
    only:
        - tags

